<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ten3 HD Player</title>
  <style>
    body { margin: 0; background: #000; font-family: Arial, sans-serif; }
    #video-container {
      width: 100%;
      max-width: 1280px;
      margin: 20px auto;
      background: #111;
    }
    video { width: 100%; height: auto; }
    .controls { text-align: center; margin: 10px; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; }
  </style>
</head>
<body>

  <div id="video-container">
    <video id="video" controls autoplay></video>
  </div>

  <div class="controls">
    <button onclick="loadPlayer()">Load & Play Stream</button>
  </div>

  <!-- Shaka Player Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.0/shaka-player.compiled.min.js"></script>

  <script>
    const CONFIG = {
      streamUrl: "https://jiotvioslive.cdn.jio.com/bpk-tv/Ten3_HD_BTS/output/index.mpd",
      keyId: "71719eea0bbb5319a4e854ac52ea7871",
      key: "752ed8f45c43ed858af4c1716c05241a",
      cookieUrl: "https://matcheslinkz.pages.dev/cookie.json"
    };

    async function loadPlayer() {
      const video = document.getElementById('video');

      // Install polyfills (required for older browsers)
      if (!window.shaka) {
        console.error("Shaka Player not loaded");
        return;
      }
      shaka.polyfill.installAll();

      // Check browser support
      if (!shaka.Player.isBrowserSupported()) {
        alert("Your browser does not support Shaka Player / DRM playback.");
        return;
      }

      const player = new shaka.Player(video);

      // Optional: Add error listener
      player.addEventListener('error', (event) => {
        console.error('Player error:', event.detail);
        alert('Playback error. Check console for details.');
      });

      try {
        // 1. Fetch cookies (if needed for authentication)
        console.log("Fetching cookies from:", CONFIG.cookieUrl);
        const cookieRes = await fetch(CONFIG.cookieUrl);
        const cookieData = await cookieRes.json();
        console.log("Cookies fetched:", cookieData);

        // You can add cookies/headers here if the stream requires them
        // For many Jio streams, the keyId + key (Clear Key style) is sufficient

        // 2. Configure Clear Key DRM (since you provided raw keyId + key)
        // This is much simpler and more reliable than Widevine for this setup
        player.configure({
          drm: {
            clearKeys: {
              [CONFIG.keyId]: CONFIG.key   // keyId : key
            }
          }
        });

        // Alternative: If it's Widevine instead of Clear Key, use this:
        /*
        player.configure({
          drm: {
            servers: {
              'com.widevine.alpha': 'https://your-widevine-license-server'  // if you have one
            }
          }
        });
        */

        console.log("Loading stream:", CONFIG.streamUrl);
        await player.load(CONFIG.streamUrl);

        console.log("Stream loaded successfully!");
        video.play().catch(err => console.warn("Autoplay prevented:", err));

      } catch (error) {
        console.error("Error loading player:", error);
        alert("Failed to load stream. Check console (F12).");
      }
    }

    // Auto-load when page opens
    window.onload = loadPlayer;
  </script>
</body>
</html>
