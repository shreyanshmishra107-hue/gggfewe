<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sony Sports Ten 3 HD - Live</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    /* Hide spinner */
    .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg {
      display: none !important;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modal.hidden { display: none !important; }
    .modal-content {
      background: rgba(20,20,30,0.95);
      border: 1px solid #444;
      border-radius: 18px;
      padding: 30px 25px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: #eee;
    }
    .modal-content h2 { color: #facc15; margin-bottom: 12px; }
    .modal-content p { margin-bottom: 24px; line-height: 1.5; }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    #joinButton { background: linear-gradient(to right, #1e88e5, #00acc1); color: white; font-weight: 600; }
    #refreshBtn { background: #d32f2f; color: white; margin-top: 10px; }
  </style>
</head>
<body>

  <!-- Telegram Modal -->
  <div id="telegramModal" class="modal">
    <div class="modal-content">
      <h2>Join Our Telegram</h2>
      <p>Stay updated with working live links, scores &amp; fast streams for all matches.</p>
      <a id="joinLink" href="https://t.me/+RSjqR7v1laE1ZTJl" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:block">
        <button id="joinButton" class="btn">Join Telegram Channel</button>
      </a>
      <button id="closeButton" class="btn" style="background:rgba(255,255,255,0.1);">Maybe Later</button>
    </div>
  </div>

  <!-- Player Container -->
  <div class="shaka-video-container" data-shaka-player-container>
    <video autoplay playsinline preload="metadata"></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const video = document.querySelector('video');
      let playerInstance = null;

      // ================== COOKIE (HDNEA) ==================
      const COOKIE_URL = 'https://matcheslinkz.pages.dev/cookie.json';
      let cookieHeader = '';

      async function fetchCookie() {
        try {
          const res = await fetch(COOKIE_URL + '?t=' + Date.now());
          if (!res.ok) throw new Error();
          const data = await res.json();
          if (data && data.cookieHeader) {
            cookieHeader = data.cookieHeader;
            console.log('✅ HDNEA token updated');
            return true;
          }
        } catch (e) {
          console.warn('⚠️ Failed to fetch HDNEA cookie');
        }
        return false;
      }

      await fetchCookie();
      setInterval(fetchCookie, 5 * 60 * 1000); // Refresh every 5 min

      // ================== SHAKA PLAYER ==================
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        alert("Browser not supported. Please use latest Google Chrome.");
        return;
      }

      const player = new shaka.Player();
      playerInstance = player;
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause', 'time_and_duration', 'mute', 'volume',
          'spacer', 'quality', 'fullscreen'
        ],
        seekBarColors: {
          base: '#444',
          buffered: '#666',
          played: '#00ff88'
        }
      });

      const drmConfig = {
        clearKeys: {
          "71719eea0bbb5319a4e854ac52ea7871": "752ed8f45c43ed858af4c1716c05241a"
        }
      };

      const streamUrl = "https://jiotvioslive.cdn.jio.com/bpk-tv/Ten3_HD_BTS/output/index.mpd";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 18,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: { timeout: 12000, maxAttempts: 5 }
        }
      });

      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

        if (cookieHeader) {
          request.headers['Cookie'] = cookieHeader;
          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
               type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
              !request.uris[0].includes('__hdnea__')) {
            const sep = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += sep + cookieHeader;
          }
        }
      });

      try {
        await player.load(streamUrl);
        console.log('✅ Manchester City vs Liverpool stream loaded');

        // Auto play
        setTimeout(() => {
          video.play().catch(err => console.log("Autoplay blocked:", err));
        }, 1000);

      } catch (err) {
        console.error('Load Error:', err);
        alert("Stream failed to load.\nThe token might be expired.\nTry clicking 'Refresh Stream' below.");
      }

      // ================== MODAL ==================
      const modal = document.getElementById('telegramModal');
      const closeBtn = document.getElementById('closeButton');
      const joinLink = document.getElementById('joinLink');

      function hideModal() {
        modal.classList.add('hidden');
      }

      closeBtn.addEventListener('click', hideModal);
      joinLink.addEventListener('click', hideModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

      setTimeout(hideModal, 8000); // Auto hide after 8 seconds

      // ================== REFRESH BUTTON (Added for easy fix) ==================
      const refreshBtn = document.createElement('button');
      refreshBtn.textContent = '🔄 Refresh Stream';
      refreshBtn.style.cssText = `
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        padding: 12px 24px; background: #d32f2f; color: white; border: none;
        border-radius: 30px; font-size: 16px; z-index: 10000; cursor: pointer;
      `;
      document.body.appendChild(refreshBtn);

      refreshBtn.addEventListener('click', async () => {
        refreshBtn.textContent = 'Refreshing...';
        await fetchCookie();
        if (playerInstance) {
          try {
            await playerInstance.unload();
            await playerInstance.load(streamUrl);
            video.play().catch(() => {});
            alert('Stream refreshed! If still not working, try again in 10 seconds.');
          } catch (e) {
            alert('Refresh failed. Please try reopening the page.');
          }
        }
        refreshBtn.textContent = '🔄 Refresh Stream';
      });
    });
  </script>
</body>
</html>
