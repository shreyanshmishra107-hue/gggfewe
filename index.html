<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sony Sports Ten 3 HD - Live</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color: white;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    /* Hide default spinner */
    .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg {
      display: none !important;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modal.hidden { display: none !important; }
    .modal-content {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 32px 28px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .modal-content h2 { font-size: 26px; margin-bottom: 12px; color: #facc15; }
    .modal-content p { font-size: 16px; line-height: 1.5; margin-bottom: 24px; color: #ddd; }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    #joinButton { background: linear-gradient(to right, #3b82f6, #06b6d4); color: white; font-weight: 600; }
    #joinButton:hover { transform: scale(1.03); }
    #closeButton { background: rgba(255,255,255,0.1); color: white; }
  </style>
</head>
<body>

  <!-- Telegram Modal -->
  <div id="telegramModal" class="modal">
    <div class="modal-content">
      <h2>Join Our Telegram</h2>
      <p>Stay updated with fast live match links, scores &amp; more.<br>Get instant access to working streams.</p>
      <a id="joinLink" href="https://t.me/+RSjqR7v1laE1ZTJl" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:block">
        <button id="joinButton" class="btn">Join Telegram Channel</button>
      </a>
      <button id="closeButton" class="btn">Maybe Later</button>
    </div>
  </div>

  <!-- Shaka Player Container -->
  <div class="shaka-video-container" data-shaka-player-container>
    <video autoplay playsinline preload="metadata"></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const video = document.querySelector('video');

      // ================== HDNEA COOKIE ==================
      const COOKIE_URL = 'https://matcheslinkz.pages.dev/cookie.json';
      let cookieHeader = '';

      async function fetchCookie() {
        try {
          const res = await fetch(COOKIE_URL + '?t=' + Date.now());
          if (!res.ok) throw new Error('Failed');
          const data = await res.json();
          if (data?.cookieHeader) {
            cookieHeader = data.cookieHeader;
            console.log('✅ HDNEA token loaded');
          }
        } catch (e) {
          console.warn('Cookie fetch failed - stream may not work');
        }
      }

      await fetchCookie();
      setInterval(fetchCookie, 4 * 60 * 1000); // Refresh every 4 minutes

      // ================== SHAKA PLAYER SETUP ==================
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        alert("Your browser doesn't support this player. Please use latest Chrome.");
        return;
      }

      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause', 'time_and_duration', 'mute', 'volume',
          'spacer', 'captions', 'quality', 'fullscreen'
        ],
        seekBarColors: {
          base: '#555',
          buffered: '#666',
          played: '#00ff00'
        }
      });

      const drmConfig = {
        clearKeys: {
          "71719eea0bbb5319a4e854ac52ea7871": "752ed8f45c43ed858af4c1716c05241a"
        }
      };

      const streamUrl = "https://jiotvioslive.cdn.jio.com/bpk-tv/Ten3_HD_BTS/output/index.mpd";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 20,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: { timeout: 15000, maxAttempts: 6, baseDelay: 500 }
        }
      });

      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

        if (cookieHeader) {
          request.headers['Cookie'] = cookieHeader;
          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
               type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
              !request.uris[0].includes('__hdnea__=')) {
            const sep = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += sep + cookieHeader;
          }
        }
      });

      try {
        await player.load(streamUrl);
        console.log('✅ Stream loaded successfully');

        // Try to autoplay
        setTimeout(() => {
          video.play().catch(() => console.log("Autoplay prevented - tap screen to play"));
        }, 800);

        // Try fullscreen on mobile
        if (video.requestFullscreen && /Mobi|Android/i.test(navigator.userAgent)) {
          setTimeout(() => video.requestFullscreen().catch(() => {}), 1500);
        }
      } catch (err) {
        console.error('Load failed:', err);
        alert("Stream failed to load. The HDNEA token may have expired. Try refreshing the page.");
      }

      // ================== MODAL LOGIC ==================
      const modal = document.getElementById('telegramModal');
      const closeBtn = document.getElementById('closeButton');
      const joinLink = document.getElementById('joinLink');

      function hideModal() {
        modal.classList.add('hidden');
      }

      closeBtn.addEventListener('click', hideModal);
      joinLink.addEventListener('click', () => setTimeout(hideModal, 800));
      modal.addEventListener('click', e => { if (e.target === modal) hideModal(); });

      // Auto hide after 8 seconds
      setTimeout(hideModal, 8000);
    });
  </script>
</body>
</html>
