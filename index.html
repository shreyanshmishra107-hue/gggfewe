<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sony Sports Ten 2 HD</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    /* Hide default spinner */
    .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg {
      display: none !important;
    }

    /* Telegram Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal.hidden { display: none !important; }
    .modal-content {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 30px 25px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: #f3f4f6;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .modal-content h2 { color: #facc15; margin-bottom: 16px; }
    .modal-content p { margin-bottom: 24px; line-height: 1.5; }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    #joinButton {
      background: linear-gradient(to right, #3b82f6, #06b6d4);
      color: white;
    }
    #closeButton {
      background: rgba(255,255,255,0.1);
      color: #f3f4f6;
    }
  </style>
</head>
<body>

  <!-- Telegram Modal -->
  <div id="telegramModal" class="modal">
    <div class="modal-content">
      <h2>Join our Telegram</h2>
      <p>Stay updated with the latest <strong>Live Match Links</strong> and updates.</p>
      <a id="joinLink" href="https://t.me/+RSjqR7v1laE1ZTJl" target="_blank" style="text-decoration:none;display:block">
        <button id="joinButton" class="btn">Join Telegram</button>
      </a>
      <button id="closeButton" class="btn">Maybe Later</button>
    </div>
  </div>

  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata"></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const video = document.querySelector('video');
      const container = document.querySelector('.shaka-video-container');

      // Install polyfills
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        alert("Your browser does not support Shaka Player.");
        return;
      }

      const player = new shaka.Player();
      await player.attach(video);

      const ui = new shaka.ui.Overlay(player, container, video);
      ui.configure({
        controlPanelElements: [
          'play_pause', 'time_and_duration', 'mute', 'volume',
          'spacer', 'language', 'captions', 'quality', 'fullscreen'
        ],
        volumeBarColors: { base: 'rgba(63, 187, 1, 1)' },
        seekBarColors: { 
          base: 'rgb(41, 41, 163)',
          buffered: 'rgb(35, 99, 3)',
          played: 'rgba(63, 187, 1, 1)'
        }
      });

      // Updated stream URL (Jio Ten 2 HD)
      const streamUrl = "https://jiotvioslive.cdn.jio.com/bpk-tv/Ten2_HD_BTS/output/index.mpd";

      // DRM Configuration (old key kept as fallback - may need update)
      const drmConfig = {
        clearKeys: {
          "7771cca923225ce08887cbae764e72c6": "67d80b71f02d2cd1e4e0ee7b9b752841"
        }
      };

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 20,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: {
            timeout: 15000,
            maxAttempts: 6,
            baseDelay: 500,
            backoffFactor: 1.5
          }
        },
        manifest: {
          retryParameters: { timeout: 10000, maxAttempts: 4 }
        }
      });

      // Request Filter - Headers
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
        request.headers['Origin'] = 'https://www.jiotv.com';
      });

      try {
        console.log("Loading stream...");
        await player.load(streamUrl);
        console.log("✅ Stream loaded successfully");

        // Autoplay with fallback
        try {
          await video.play();
          console.log("✅ Autoplay started with audio");
        } catch (e) {
          console.warn("Autoplay with audio failed, trying muted...");
          video.muted = true;
          await video.play();
          console.log("✅ Muted autoplay succeeded");
          
          // Try to unmute after user interaction
          setTimeout(() => {
            video.muted = false;
            video.play().catch(() => {});
          }, 1500);
        }
      } catch (error) {
        console.error("❌ Load failed:", error);
        alert("Failed to load stream. The link may be expired or blocked.\n\nCheck console for details.");
      }

      // Telegram Modal Logic
      const modal = document.getElementById('telegramModal');
      const closeBtn = document.getElementById('closeButton');
      const joinLink = document.getElementById('joinLink');

      function hideModal() {
        modal.classList.add('hidden');
        video.play().catch(() => {});
      }

      closeBtn.addEventListener('click', hideModal);
      joinLink.addEventListener('click', () => setTimeout(hideModal, 300));
      modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

      // Auto hide modal after 8 seconds
      setTimeout(hideModal, 8000);
    });
  </script>
</body>
</html>
